name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please fill out as much as you can — it helps us reproduce and fix the issue faster.

  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: "e.g. 1.2.0 (build 42)"
    validations:
      required: true

  - type: input
    id: ios_version
    attributes:
      label: iOS Version
      placeholder: "e.g. iOS 26.2"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g. iPhone 16 Pro"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open the app
        2. Start a tracking session
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: feature_area
    attributes:
      label: Feature Area
      options:
        - GPS Tracking / Run Detection
        - Crew / Location Sharing
        - Apple Watch
        - Gear Checklist
        - Session History
        - Maps / Resort Detection
        - Share Cards
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Crash Logs or Console Output
      description: Paste any relevant crash logs or Xcode console output.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been reported yet
          required: true
